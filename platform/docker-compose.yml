services:
  postgres:
    image: postgres:16-alpine
    container_name: sparc-assessment-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: sparc
      POSTGRES_PASSWORD: sparc_dev_password
      POSTGRES_DB: sparc_assessment
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
