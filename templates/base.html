<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Coding Block{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --cb-bg: #f1f5f9;
            --cb-surface: #ffffff;
            --cb-border: #e2e8f0;
            --cb-text: #0f172a;
            --cb-muted: #64748b;
            --cb-accent: #2563eb;
            --cb-accent-soft: #eff6ff;
            --cb-success: #059669;
            --cb-success-soft: #ecfdf5;
            --cb-warning: #d97706;
            --cb-danger: #dc2626;
            --cb-radius: 12px;
            --cb-radius-sm: 8px;
            --cb-shadow: 0 1px 3px rgba(15, 23, 42, 0.06), 0 1px 2px rgba(15, 23, 42, 0.04);
            --cb-shadow-lg: 0 10px 40px -10px rgba(15, 23, 42, 0.12);
        }

        body {
            font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
            background: var(--cb-bg);
            color: var(--cb-text);
            min-height: 100vh;
        }

        .navbar-cb {
            background: var(--cb-surface) !important;
            border-bottom: 1px solid var(--cb-border);
            box-shadow: var(--cb-shadow);
        }
        .navbar-cb .navbar-brand {
            font-weight: 700;
            color: var(--cb-accent) !important;
            letter-spacing: -0.02em;
        }
        .navbar-cb .nav-link { color: var(--cb-muted) !important; font-weight: 500; }
        .navbar-cb .nav-link:hover { color: var(--cb-accent) !important; }

        .cb-main { max-width: 1200px; }

        /* —— Assessment panel system —— */
        .panel-hero {
            background: linear-gradient(135deg, var(--cb-surface) 0%, var(--cb-accent-soft) 100%);
            border: 1px solid var(--cb-border);
            border-radius: var(--cb-radius);
            padding: 1.75rem 2rem;
            margin-bottom: 1.5rem;
            box-shadow: var(--cb-shadow);
        }
        .panel-hero h1 {
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            margin-bottom: 0.35rem;
        }
        .panel-hero .lead {
            color: var(--cb-muted);
            font-size: 0.95rem;
            margin-bottom: 0;
        }

        .panel-stat-card {
            background: var(--cb-surface);
            border: 1px solid var(--cb-border);
            border-radius: var(--cb-radius);
            padding: 1.25rem 1.35rem;
            height: 100%;
            box-shadow: var(--cb-shadow);
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }
        .panel-stat-card:hover {
            box-shadow: var(--cb-shadow-lg);
            transform: translateY(-2px);
        }
        .panel-stat-card .icon-wrap {
            width: 2.5rem;
            height: 2.5rem;
            border-radius: var(--cb-radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            margin-bottom: 0.75rem;
        }
        .panel-stat-card .label {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--cb-muted);
            margin-bottom: 0.35rem;
        }
        .panel-stat-card .value {
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            line-height: 1.1;
        }
        .panel-stat-card .sub { font-size: 0.8rem; color: var(--cb-muted); margin-top: 0.25rem; }

        .panel-section {
            background: var(--cb-surface);
            border: 1px solid var(--cb-border);
            border-radius: var(--cb-radius);
            margin-bottom: 1.5rem;
            box-shadow: var(--cb-shadow);
            overflow: hidden;
        }
        .panel-section-header {
            padding: 1rem 1.35rem;
            border-bottom: 1px solid var(--cb-border);
            background: linear-gradient(180deg, #fafbfc 0%, var(--cb-surface) 100%);
        }
        .panel-section-header h2, .panel-section-header h5 {
            margin: 0;
            font-size: 1.05rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }
        .panel-section-header .hint { font-size: 0.8rem; color: var(--cb-muted); font-weight: 400; margin-top: 0.25rem; }
        .panel-section-body { padding: 1.35rem; }

        .badge-result {
            font-size: 0.7rem;
            font-weight: 600;
            padding: 0.35em 0.65em;
            border-radius: 6px;
            letter-spacing: 0.02em;
        }
        .badge-result-pass { background: var(--cb-success-soft); color: var(--cb-success); }
        .badge-result-fail { background: #f1f5f9; color: var(--cb-muted); }

        .level-panel-card {
            border: 1px solid var(--cb-border);
            border-radius: var(--cb-radius);
            margin-bottom: 1.25rem;
            background: #fafbfc;
            overflow: hidden;
        }
        .level-panel-card:last-child { margin-bottom: 0; }
        .level-panel-head {
            padding: 1rem 1.25rem;
            background: var(--cb-surface);
            border-bottom: 1px solid var(--cb-border);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 0.75rem;
        }
        .level-panel-title {
            font-weight: 700;
            font-size: 1.1rem;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .level-meta-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 0.75rem;
            padding: 1rem 1.25rem;
            background: var(--cb-surface);
            font-size: 0.875rem;
        }
        .level-meta-grid .meta-item .k { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--cb-muted); font-weight: 600; }
        .level-meta-grid .meta-item .v { font-weight: 700; font-size: 0.95rem; }

        .cmd-flow {
            font-family: ui-monospace, 'Cascadia Code', 'Consolas', monospace;
            font-size: 0.82rem;
            line-height: 1.6;
            background: #f8fafc;
            border: 1px solid var(--cb-border);
            border-radius: var(--cb-radius-sm);
            padding: 0.75rem 1rem;
            color: #334155;
        }
        .cmd-flow .arrow { color: #94a3b8; padding: 0 0.2em; }

        .telemetry-panel {
            border-radius: var(--cb-radius-sm);
            border: 1px solid var(--cb-border);
            background: #f8fafc;
            padding: 1rem 1.15rem;
            margin-top: 1rem;
        }
        .telemetry-panel h6 {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--cb-muted);
            font-weight: 700;
            margin-bottom: 0.85rem;
        }
        .tl-row {
            display: grid;
            grid-template-columns: minmax(100px, 140px) 1fr;
            gap: 0.5rem 1rem;
            font-size: 0.875rem;
            padding: 0.35rem 0;
            border-bottom: 1px solid #e2e8f0;
        }
        .tl-row:last-child { border-bottom: none; }
        .tl-row .k { color: var(--cb-muted); font-weight: 500; }
        .tl-row .v { font-weight: 500; word-break: break-word; }

        .run-step {
            border-left: 3px solid var(--cb-accent);
            padding: 0.5rem 0 0.5rem 0.85rem;
            margin-bottom: 0.65rem;
            background: var(--cb-surface);
            border-radius: 0 var(--cb-radius-sm) var(--cb-radius-sm) 0;
            font-size: 0.85rem;
        }
        .run-step strong { color: var(--cb-accent); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.04em; }

        .pill-robot {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            background: #fef3c7;
            color: #b45309;
            font-size: 0.75rem;
            font-weight: 600;
            padding: 0.25rem 0.6rem;
            border-radius: 999px;
        }
        .pill-robot.none { background: #f1f5f9; color: var(--cb-muted); }

        .accordion-assessment .accordion-button {
            font-weight: 600;
            font-size: 0.9rem;
        }
        .accordion-assessment .accordion-button:not(.collapsed) {
            background: var(--cb-accent-soft);
            color: var(--cb-accent);
            box-shadow: none;
        }

        .table-students thead th {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--cb-muted);
            font-weight: 700;
            border-bottom-width: 2px;
        }
        .table-students tbody tr { transition: background 0.12s; }
        .table-students tbody tr:hover { background: #f8fafc; }

        .search-glass {
            max-width: 320px;
        }

        .log-entry, .assessment-history-item {
            border-bottom: 1px solid var(--cb-border);
            padding: 1rem 0;
        }
        .log-entry:last-child, .assessment-history-item:last-child { border-bottom: none; }

        .assessment-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        .assessment-table th, .assessment-table td {
            border: 1px solid var(--cb-border);
            padding: 0.5rem 0.75rem;
        }
        .assessment-table th { background: #f8fafc; font-weight: 600; font-size: 0.8rem; }
        .assessment-feedback {
            background: #f8fafc;
            padding: 1rem;
            border-radius: var(--cb-radius-sm);
            border: 1px solid var(--cb-border);
            white-space: pre-wrap;
            font-size: 0.9rem;
        }
        .dimension-score { color: var(--cb-accent); font-weight: 700; }

        .card-header.bg-assessment {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%) !important;
            color: #fff !important;
            border: none;
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-cb sticky-top">
        <div class="container cb-main">
            <a class="navbar-brand" href="{{ url_for('index') }}">Coding Block</a>
            {% if session.user_id %}
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="{{ url_for('login') if false else '#' }}"></a>
                <a class="nav-link" href="{{ url_for('logout') }}">Log out</a>
            </div>
            {% endif %}
        </div>
    </nav>

    <div class="container cb-main py-4 py-md-5">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
